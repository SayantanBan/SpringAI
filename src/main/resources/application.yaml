spring:
  application:
    name: mcpserver
  ai:
    mcp:
      server:
        name: mcpseverdemo
        version: 0.1.1
        protocol: streamable
        stdio: false
        type: sync
    # To Stop auto configure chatclient.builder
    chat:
      client:
        enabled: false
    openai:
      api-key: ${OPENAI_API_KEY}
#    model:
#      chat: ollama
    ollama:
      chat:
        options:
          model: llama3.2:1b

logging:
  pattern:
    console: "%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n"
